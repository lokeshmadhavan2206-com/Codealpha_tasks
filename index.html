<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="operator" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        <button class="operator" onclick="append('%')">%</button>
        <button class="operator" onclick="append('/')">÷</button>

        <button onclick="append('7')">7</button>
        <button onclick="append('8')">8</button>
        <button onclick="append('9')">9</button>
        <button class="operator" onclick="append('*')">×</button>

        <button onclick="append('4')">4</button>
        <button onclick="append('5')">5</button>
        <button onclick="append('6')">6</button>
        <button class="operator" onclick="append('-')">−</button>

        <button onclick="append('1')">1</button>
        <button onclick="append('2')">2</button>
        <button onclick="append('3')">3</button>
        <button class="operator" onclick="append('+')">+</button>

        <button onclick="append('0')">0</button>
        <button onclick="append('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

</div>

<script src="script.js"></script>
  <style>
  *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1d4350,#a43931);
}

.calculator{

    background:#20232a;
    padding:25px;
    border-radius:20px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.4);

    width:350px;
}

#display{

    width:100%;
    height:70px;

    border:none;
    outline:none;

    background:#2f3542;

    color:white;

    text-align:right;

    font-size:30px;

    padding:15px;

    border-radius:10px;

    margin-bottom:20px;
}

.buttons{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:15px;
}

button{

    height:65px;

    border:none;

    border-radius:12px;

    font-size:22px;

    cursor:pointer;

    transition:.3s;
}

button:hover{

    transform:scale(1.05);
}

button:active{

    transform:scale(.95);
}

.operator{

    background:#ff9500;

    color:white;
}

.operator:hover{

    background:#ffac33;
}

.equal{

    background:#28a745;

    color:white;

    grid-column:span 2;
}

.equal:hover{

    background:#3ac75d;
}

button:not(.operator):not(.equal){

    background:#3b3f47;

    color:white;
}

button:not(.operator):not(.equal):hover{

    background:#565b66;
}

@media(max-width:400px){

.calculator{

width:95%;
}

button{

height:60px;
}

#display{

font-size:25px;
}
}
  </style>
  <script>
    let display = document.getElementById("display");

function append(value){

    display.value += value;
}

function clearDisplay(){

    display.value = "";
}

function deleteLast(){

    display.value = display.value.slice(0,-1);
}

function calculate(){

    try{

        display.value = eval(display.value);

    }

    catch{

        display.value = "Error";
    }
}

document.addEventListener("keydown",function(e){

    const key = e.key;

    if(
        (key>='0' && key<='9') ||
        ['+','-','*','/','.','%','(',')'].includes(key)
    ){

        display.value += key;
    }

    else if(key==="Enter"){

        e.preventDefault();

        calculate();
    }

    else if(key==="Backspace"){

        deleteLast();
    }

    else if(key==="Escape"){

        clearDisplay();
    }
});
  </script>

</body>
</html>
